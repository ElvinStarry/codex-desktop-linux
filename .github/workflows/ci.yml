name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI_PACKAGE_VERSION: 2026.04.28.000000+ci${{ github.run_number }}

jobs:
  rust-and-smoke:
    name: Rust and Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Check shell syntax
        run: |
          set -euo pipefail
          bash -n install.sh
          bash -n scripts/install-deps.sh
          bash -n scripts/build-deb.sh
          bash -n scripts/build-rpm.sh
          bash -n scripts/build-pacman.sh
          bash -n scripts/build-appimage.sh
          bash -n scripts/ci/update-nix-hashes.sh
          bash -n scripts/ci/validate-nix-pins.sh

      - name: Check Node patcher syntax
        run: |
          set -euo pipefail
          node --check scripts/patch-linux-window-ui.js
          node --check scripts/patch-linux-window-ui.test.js
          for file in scripts/patches/*.js; do
            node --check "$file"
          done
          node --check scripts/ci/validate-patch-report.js

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run Rust checks
        run: cargo check --workspace --all-targets

      - name: Run Rust tests
        run: cargo test --workspace --all-targets

      - name: Run script smoke tests
        run: |
          set -euo pipefail
          bash tests/scripts_smoke.sh

      - name: Write Rust and Smoke summary
        run: |
          {
            echo "## Rust and Smoke Tests"
            echo ""
            echo "- Shell syntax checks passed."
            echo "- Rust formatting, clippy, check, tests passed."
            echo "- Script smoke tests passed."
          } >> "$GITHUB_STEP_SUMMARY"

  package-deb:
    name: Build Debian Package From Upstream DMG
    runs-on: ubuntu-latest
    env:
      CODEX_LINUX_ENABLE_COMPUTER_USE_UI: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Write CI Linux feature config
        run: |
          set -euo pipefail
          mkdir -p linux-features
          cat > linux-features/features.json <<'EOF'
          {
            "enabled": [
              "agent-workspace",
              "appshots",
              "open-target-discovery",
              "api-key-service-tier"
            ]
          }
          EOF

      - name: Build Debian package from real upstream app build
        run: ./scripts/ci-local.sh upstream-deb

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-deb
          path: dist/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload Debian upstream build metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-deb-upstream-metadata
          path: |
            upstream-dmg-metadata.json
            patch-report.json
          if-no-files-found: ignore
          retention-days: 14

  nix:
    name: Nix Package Builds
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NIX_CONFIG: |
        experimental-features = nix-command flakes
        max-jobs = 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: cachix/install-nix-action@v27

      - name: Configure Cachix for Nix build substitutions
        uses: cachix/cachix-action@v17
        with:
          name: codex-desktop-linux
          skipPush: true

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Detect Nix pin file changes
        id: nix-pin-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          changed=false
          changed_files="$(mktemp)"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            gh api \
              "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
              --paginate \
              --jq '.[].filename' | tee "$changed_files"
            if grep -Eq '^(flake\.nix|flake\.lock|nix/native-modules/package\.json|nix/native-modules/package-lock\.json|scripts/ci/update-nix-hashes\.sh|scripts/ci/validate-nix-pins\.sh)$' "$changed_files"; then
              changed=true
              {
                echo "## Nix Pin File Changes"
                echo ""
                echo "- Rollout skip is disabled because this PR changes Nix pin source-of-truth files."
                echo "- Changed guarded files:"
                grep -E '^(flake\.nix|flake\.lock|nix/native-modules/package\.json|nix/native-modules/package-lock\.json|scripts/ci/update-nix-hashes\.sh|scripts/ci/validate-nix-pins\.sh)$' "$changed_files" | sed 's/^/  - `/' | sed 's/$/`/'
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          rm -f "$changed_files"

      - name: Validate Nix pins against upstream DMG
        id: nix-pin-validation
        env:
          NIX_PIN_FILES_CHANGED: ${{ steps.nix-pin-files.outputs.changed }}
        run: |
          set -euo pipefail
          validation_log="$(mktemp)"
          set +e
          scripts/ci/validate-nix-pins.sh 2>&1 | tee "$validation_log"
          validation_status="${PIPESTATUS[0]}"
          set -e
          if [ "$validation_status" -ne 0 ]; then
            if [ "$GITHUB_EVENT_NAME" = "pull_request" ] \
              && [ "$NIX_PIN_FILES_CHANGED" != "true" ] \
              && grep -Eq "Codex app version pin mismatch|Electron version pin mismatch|native-modules .* pin mismatch" "$validation_log"; then
              {
                echo "## Nix Pin Validation"
                echo ""
                echo "- Skipped package-output builds because upstream \`Codex.dmg\` metadata is ahead of committed flake pins during rollout."
                echo "- This is PR-only; main-branch validation still fails so the scheduled hash-refresh workflow can open a full pin-refresh PR for the current upstream DMG."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "skip_package_outputs=true" >> "$GITHUB_OUTPUT"
              rm -f "$validation_log"
              exit 0
            fi
            exit "$validation_status"
          fi
          echo "skip_package_outputs=false" >> "$GITHUB_OUTPUT"
          rm -f "$validation_log"

      - name: Check flake evaluation
        run: nix flake check --no-build

      - name: Build Nix package outputs
        if: steps.nix-pin-validation.outputs.skip_package_outputs != 'true'
        env:
          NIX_PIN_FILES_CHANGED: ${{ steps.nix-pin-files.outputs.changed }}
        run: |
          set -euo pipefail
          outputs=(
            .#installer
            .#codex-desktop
            .#codex-desktop-computer-use-ui
            .#codex-desktop-remote-mobile-control
            .#codex-desktop-computer-use-ui-remote-mobile-control
          )
          for output in "${outputs[@]}"; do
            build_log="$(mktemp)"
            if ! nix build "$output" --no-link --print-build-logs --max-jobs 1 2>&1 | tee "$build_log"; then
              if [ "$GITHUB_EVENT_NAME" = "pull_request" ] \
                && [ "$NIX_PIN_FILES_CHANGED" != "true" ] \
                && grep -q "hash mismatch in fixed-output derivation" "$build_log" \
                && grep -q "Codex.dmg.drv" "$build_log"; then
                {
                  echo "## Nix Package Builds"
                  echo ""
                  echo "- Skipped package-output builds after \`$output\` because upstream \`Codex.dmg\` is rolling between fixed-output hashes."
                  echo "- This does not mask non-DMG Nix failures; main-branch builds still fail on this condition."
                  echo "- The scheduled hash-refresh workflow owns updating the committed DMG pin for the current upstream DMG."
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              exit 1
            fi
            rm -f "$build_log"
            store_usage="$(df -P /nix/store | awk 'NR == 2 { gsub("%", "", $5); print $5 }')"
            if [ "${store_usage:-0}" -ge 85 ]; then
              nix store gc || true
            fi
          done

  package-rpm:
    name: Build RPM Package From Upstream DMG
    runs-on: ubuntu-latest
    env:
      CODEX_LINUX_ENABLE_COMPUTER_USE_UI: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Write CI Linux feature config
        run: |
          set -euo pipefail
          mkdir -p linux-features
          cat > linux-features/features.json <<'EOF'
          {
            "enabled": [
              "agent-workspace",
              "appshots",
              "open-target-discovery",
              "api-key-service-tier"
            ]
          }
          EOF

      - name: Build RPM package from real upstream app build
        run: ./scripts/ci-local.sh upstream-rpm

      - name: Upload RPM package artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-rpm
          path: dist/*.rpm
          if-no-files-found: error
          retention-days: 14

      - name: Upload RPM upstream build metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-rpm-upstream-metadata
          path: |
            upstream-dmg-metadata.json
            patch-report.json
          if-no-files-found: ignore
          retention-days: 14

  package-pacman:
    name: Build Pacman Package From Upstream DMG
    runs-on: ubuntu-latest
    env:
      CODEX_LINUX_ENABLE_COMPUTER_USE_UI: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Write CI Linux feature config
        run: |
          set -euo pipefail
          mkdir -p linux-features
          cat > linux-features/features.json <<'EOF'
          {
            "enabled": [
              "agent-workspace",
              "appshots",
              "open-target-discovery",
              "api-key-service-tier"
            ]
          }
          EOF

      - name: Build pacman package from real upstream app build
        run: ./scripts/ci-local.sh upstream-pacman

      - name: Upload Pacman package artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-pacman
          path: dist/*.pkg.tar.*
          if-no-files-found: error
          retention-days: 14

      - name: Upload Pacman upstream build metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-desktop-pacman-upstream-metadata
          path: |
            upstream-dmg-metadata.json
            patch-report.json
          if-no-files-found: ignore
          retention-days: 14
